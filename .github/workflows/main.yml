name: Premium Ad Clicker Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils google-chrome-stable
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64 || sudo apt-get install -y libasound2 || true

      - name: Install Python Requirements
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install seleniumbase --upgrade

      - name: Force Install Latest Driver
        run: sbase install chromedriver latest

      - name: Run Bot with Virtual Display
        env:
          GITHUB_ACTIONS: "true"
        run: |
          xvfb-run --server-args="-screen 0 1920x1080x24" python ad_clicker.py --query "https://abr.ge/zz4y46"
